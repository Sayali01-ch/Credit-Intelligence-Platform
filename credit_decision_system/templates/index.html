<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Decision System - Loan Application</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .form-section {
            padding: 40px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-upload {
            grid-column: span 2;
        }
        
        .file-upload-area {
            border: 2px dashed #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .file-upload-area:hover {
            border-color: #667eea;
            background: #f5f5f5;
        }
        
        .file-list {
            margin-top: 15px;
        }
        
        .file-item {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .remove-file {
            color: #ff4757;
            cursor: pointer;
            font-weight: bold;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .result-section {
            background: #f8f9fa;
            padding: 30px;
            border-top: 1px solid #e0e0e0;
            display: none;
        }
        
        .result-section.show {
            display: block;
        }
        
        .decision-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .decision-approve {
            border-left: 5px solid #28a745;
        }
        
        .decision-reject {
            border-left: 5px solid #dc3545;
        }
        
        .decision-review {
            border-left: 5px solid #ffc107;
        }
        
        .score-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏦 Credit Decision Intelligence System</h1>
            <p>AI-Powered Loan Approval with Explainable Decisions</p>
        </div>
        
        <div class="main-card">
            <div class="form-section">
                <form id="applicationForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" name="full_name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" name="age" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Annual Income ($)</label>
                            <input type="number" name="annual_income" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Employment Years</label>
                            <input type="number" name="employment_years" step="0.5" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Loan Amount ($)</label>
                            <input type="number" name="loan_amount" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Debt-to-Income Ratio (0-1)</label>
                            <input type="number" name="debt_to_income_ratio" step="0.01" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Credit History Length (years)</label>
                            <input type="number" name="credit_history_length" step="0.5" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Number of Credit Cards</label>
                            <input type="number" name="num_credit_cards" value="2">
                        </div>
                        
                        <div class="form-group">
                            <label>Total Debt ($)</label>
                            <input type="number" name="total_debt" value="0">
                        </div>
                        
                        <div class="form-group">
                            <label>Credit Utilization (0-1)</label>
                            <input type="number" name="credit_utilization" step="0.01" value="0.3">
                        </div>
                        
                        <div class="form-group">
                            <label>Payment History (0-1)</label>
                            <input type="number" name="payment_history" step="0.01" value="0.8">
                        </div>
                        
                        <div class="file-upload">
                            <label>Supporting Documents (Bank Statements, Pay Stubs)</label>
                            <div class="file-upload-area" onclick="document.getElementById('documents').click()">
                                📄 Click or drag to upload documents
                                <input type="file" id="documents" name="documents" multiple accept=".pdf,.png,.jpg" style="display:none">
                            </div>
                            <div id="fileList" class="file-list"></div>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn">Submit Application</button>
                </form>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 20px;">Processing your application with AI...</p>
            </div>
            
            <div class="result-section" id="resultSection">
                <!-- Results will be displayed here -->
            </div>
        </div>
    </div>
    
    <script>
        let selectedFiles = [];
        
        document.getElementById('documents').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            updateFileList();
        });
        
        function updateFileList() {
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = selectedFiles.map((file, index) => `
                <div class="file-item">
                    <span>📄 ${file.name}</span>
                    <span class="remove-file" onclick="removeFile(${index})">✖</span>
                </div>
            `).join('');
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }
        
        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            selectedFiles.forEach(file => {
                formData.append('documents', file);
            });
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultSection').classList.remove('show');
            
            try {
                const response = await fetch('/api/apply', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    displayResult(result);
                } else {
                    alert('Error: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Network error: ' + error.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        });
        
        function displayResult(result) {
            const decision = result.decision;
            const recommendation = decision.recommendation;
            
            let decisionClass = 'decision-review';
            let decisionText = 'Under Review';
            let decisionIcon = '📋';
            
            if (recommendation === 'approve') {
                decisionClass = 'decision-approve';
                decisionText = 'APPROVED';
                decisionIcon = '✅';
            } else if (recommendation === 'reject') {
                decisionClass = 'decision-reject';
                decisionText = 'NOT APPROVED';
                decisionIcon = '❌';
            }
            
            const resultHtml = `
                <div class="decision-card ${decisionClass}">
                    <h2>${decisionIcon} Decision: ${decisionText}</h2>
                    <div class="score-display">
                        Credit Score: ${decision.credit_score}/1000
                    </div>
                    <p><strong>Risk Category:</strong> ${decision.risk_category}</p>
                    ${decision.explanation_text ? `<p><strong>Explanation:</strong><br>${decision.explanation_text}</p>` : ''}
                    <p><strong>Processing Time:</strong> ${decision.processing_time_ms}ms</p>
                </div>
                
                ${decision.explanation && decision.explanation.top_factors ? `
                <div class="decision-card">
                    <h3>📊 Key Decision Factors</h3>
                    <ul>
                        ${decision.explanation.top_factors.map(factor => `<li><strong>${factor[0]}:</strong> Impact score ${factor[1].toFixed(3)}</li>`).join('')}
                    </ul>
                </div>
                ` : ''}
                
                ${result.compliance ? `
                <div class="decision-card">
                    <h3>⚖️ Compliance Status</h3>
                    <p>ECOA: ${result.compliance.ecoa_compliant ? '✅' : '❌'}</p>
                    <p>FCRA: ${result.compliance.fcra_compliant ? '✅' : '❌'}</p>
                    <p>GDPR: ${result.compliance.gdpr_compliant ? '✅' : '❌'}</p>
                </div>
                ` : ''}
                
                <div class="decision-card">
                    <h3>📋 Application ID</h3>
                    <p><code>${result.application_id}</code></p>
                    <p><small>Save this ID to check your decision later</small></p>
                </div>
            `;
            
            document.getElementById('resultSection').innerHTML = resultHtml;
            document.getElementById('resultSection').classList.add('show');
        }
    </script>
</body>
</html>
